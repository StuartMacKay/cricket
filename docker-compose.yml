x-app: &default-app
  build:
    context: "."
    target: "app"
    args:
      - "UID=${UID:-1000}"
      - "GID=${GID:-1000}"
      - "DEBUG=${DEBUG:-false}"
      - "DJANGO_ENV=${DJANGO_ENV:-development}"
  depends_on:
    postgres:
      condition: "service_healthy"
      required: false
    redis:
      condition: "service_started"
      required: false
  env_file:
    - ".env"
  environment:
    # Override the defaults in .env which are for natively installed services
    BROKER_URL: "${BROKER_URL-redis://redis:6379/1}"
    CACHE_URL: "${CACHE_URL-redis://redis:6379/0}"
    DATABASE_URL: "${DATABASE_URL-postgres://postgres:postgres@postgres:5432/postgres}"
  init: true
  restart: "${DOCKER_RESTART_POLICY:-no}"
  tty: true

services:
  postgres:
    environment:
      POSTGRES_USER: "${POSTGRES_USER-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD-postgres}"
      POSTGRES_DB: "${POSTGRES_DB-postgres}"
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-U", "${POSTGRES_USER:-postgres}"]
      interval: "5s"
      timeout: "3s"
      retries: 10
    image: "postgres:17"
    ports:
      - "${DOCKER_POSTGRES_PORT_FORWARD-127.0.0.1:5432}:5432"
    restart: "${DOCKER_RESTART_POLICY:-no}"
    volumes:
      - "pgdata:/var/lib/postgresql/data"

  redis:
    image: "redis:7.2"
    ports:
      - "${DOCKER_REDIS_PORT_FORWARD-127.0.0.1:6379}:6379"
    restart: "${DOCKER_RESTART_POLICY:-no}"
    volumes:
      - "redisdata:/data"

  django:
    <<: *default-app
    healthcheck:
      test: "${DOCKER_DJANGO_HEALTHCHECK_TEST:-curl localhost:8000/watchman/ping}"
      interval: "60s"
      timeout: "3s"
      start_period: "5s"
      retries: 3
    ports:
      - "${DOCKER_DJANGO_PORT_FORWARD-127.0.0.1:8000}:8000"
    volumes:
      - "media:/app/media"
      - "static:/app/static"

  celery-beat:
    <<: *default-app
    command: celery -A config beat --loglevel "${CELERY_LOG_LEVEL:-debug}"
    depends_on:
      django:
        condition: "service_started"
        required: false
    entrypoint: []

  celery-worker:
    <<: *default-app
    command: celery -A config worker --loglevel "${CELERY_LOG_LEVEL:-debug}" -Q sites,pages
    depends_on:
      django:
        condition: "service_started"
        required: false
    entrypoint: []
    volumes:
      - "media:/app/media"

  flower:
    <<: *default-app
    command: celery -A config flower
    depends_on:
      django:
        condition: "service_started"
        required: false
    entrypoint: []
    ports:
      - "${DOCKER_FLOWER_PORT_FORWARD-127.0.0.1:5555}:5555"

volumes:
  pgdata:
    {}
  redisdata:
    {}
  media:
    {}
  static:
    {}
