    {% load i18n %}
    <p>
      {% blocktranslate %}
        <strong>{{ category }}</strong> audits.
      {% endblocktranslate %}
    </p>
    <table class="table table-bordered table-sm">
      <thead>
      <tr>
        <th class="text-center" scope="col">{% trans "Audit" %}</th>
        <th class="text-center" scope="col">{% trans "Failed" %}</th>
        <th class="text-center" scope="col">{% trans "Passed" %}</th>
        <th class="text-center" scope="col">{% trans "Total" %}</th>
      </tr>
      </thead>
      <tbody>
      {% for audit, failed, passed in values %}
        <tr>
          <td class="text-start small">{{ audit }}</td>
          <td class="text-end small">{{ failed }}</td>
          <td class="text-end small">{{ passed }}</td>
          <td class="text-end small">{{ failed|add:passed }}</td>
        </tr>
      {% endfor %}
      </tbody>
    </table>
