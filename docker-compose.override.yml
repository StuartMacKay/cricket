# docker-compose.override.yml — local development overrides.
#
# Docker Compose automatically merges this file with docker-compose.yml
# when you run `docker compose up`, so no extra flags are needed.
#
# What this does:
#   - Builds the `dev` image stage (includes dev/test dependencies)
#   - Mounts your local source into the container so code changes are
#     reflected immediately without rebuilding the image
#   - Replaces gunicorn with Django's dev server (auto-reloads on save)
#
# The virtualenv lives at /venv (outside /app) so it is never shadowed
# by the source bind mount.
#
# media/ and static/ use host bind mounts so that generated files are
# directly accessible on the host and are written by the same UID (1000)
# as the container's python user — avoiding the root-owned named-volume
# permission problem.

services:
  django:
    build:
      target: dev
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - ./media:/app/media
      - ./static:/app/static

  celery-worker:
    build:
      target: dev
    volumes:
      - .:/app
      - ./media:/app/media

  celery-beat:
    build:
      target: dev
    volumes:
      - .:/app

  flower:
    build:
      target: dev
    volumes:
      - .:/app
