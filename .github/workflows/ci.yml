name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - '5432:5432'

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group tests

      - name: Lint
        run: uv run ruff check apps config

      - name: Format
        run: uv run ruff format --check apps config

      - name: Tests
        run: uv run pytest
        env:
          ENV: test
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          DJANGO_SECRET_KEY: secret
          DJANGO_SITE_ID: 1
          LOG_LEVEL: ERROR
          SENTRY_ENABLED: False
